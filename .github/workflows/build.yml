name: Build

on:
  push:
    branches: [feature/shifted-keys, main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Run tests
        run: |
          cl tests.c
          .\tests.exe

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        run: |
          rc resources.rc
          cl .\dual-key-remap.c resources.res /link user32.lib shell32.lib /SUBSYSTEM:WINDOWS /ENTRY:mainCRTStartup

      - name: Package release
        run: powershell -ExecutionPolicy Bypass -File .\release.ps1

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: dual-key-remap.exe
          path: dual-key-remap.exe

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: dual-key-remap-release
          path: releases/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: dual-key-remap-release
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true
